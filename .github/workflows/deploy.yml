name: LUXFI Backend CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─── SECURITY SCAN ───────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    name: Security Scan
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for secrets in code
        run: |
          if grep -r "sk-ant-api" . --include="*.js" --exclude-dir=node_modules; then
            echo "DANGER: Anthropic API key found in code!"
            exit 1
          fi
          echo "No secrets found in code ✅"

  # ─── LINT & VALIDATE ─────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    name: Lint & Validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Check syntax
        run: node --check index.js

      - name: Validate package.json
        run: node -e "require('./package.json')"

  # ─── HEALTH CHECK ────────────────────────────────────────
  health-check:
    runs-on: ubuntu-latest
    name: Production Health Check
    needs: [security, lint]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for Railway deployment
        run: sleep 30

      - name: Check health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://luxfi-backend-production.up.railway.app/health)
          if [ $STATUS -eq 200 ]; then
            echo "Health check passed ✅ Status: $STATUS"
          else
            echo "Health check failed ❌ Status: $STATUS"
            exit 1
          fi

      - name: Check API version
        run: |
          RESPONSE=$(curl -s https://luxfi-backend-production.up.railway.app/health)
          echo "API Response: $RESPONSE"
          if echo $RESPONSE | grep -q "LUXFI Backend Online"; then
            echo "API responding correctly ✅"
          else
            echo "API response unexpected ❌"
            exit 1
          fi
