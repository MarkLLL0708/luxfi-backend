name: LUXFI Backend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node --check index.js && echo "Syntax OK ✅"

  health-check:
    name: Production Health Check
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for Railway to deploy
        run: sleep 90

      - name: Check health endpoint
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://luxfi-backend-production.up.railway.app/health)
            echo "Attempt $i — Status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed ✅"
              exit 0
            fi
            sleep 20
          done
          echo "Health check failed after 5 attempts ❌"
          exit 1
